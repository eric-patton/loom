name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Flutter ships a bundled Dart SDK, so installing flutter gives us
      # `dart` for the kernel and `flutter` for the editor app from a
      # single setup step. Pinning to `stable` keeps versions in sync
      # with what local dev runs.
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      # ─── Kernel package (packages/loom) ────────────────────────────────

      - name: Kernel — resolve dependencies
        working-directory: packages/loom
        run: dart pub get

      - name: Kernel — analyze (fatal warnings + infos)
        working-directory: packages/loom
        run: dart analyze --fatal-infos --fatal-warnings

      - name: Kernel — format check
        working-directory: packages/loom
        run: dart format --output=none --set-exit-if-changed .

      - name: Kernel — test (10,000-iteration property gate)
        working-directory: packages/loom
        env:
          # Global gate from PROJECT_SPEC.md Testing Strategy: 10,000
          # random edit sequences per fixture per CI run. Local dev
          # defaults to 100.
          LOOM_PROPERTY_ITERATIONS: "10000"
        run: dart test --concurrency=1

      # ─── Editor app (packages/loom_app) ────────────────────────────────

      - name: App — resolve dependencies
        working-directory: packages/loom_app
        run: flutter pub get

      - name: App — analyze (fatal warnings + infos)
        working-directory: packages/loom_app
        run: flutter analyze --fatal-infos --fatal-warnings

      - name: App — format check
        working-directory: packages/loom_app
        run: dart format --output=none --set-exit-if-changed .

      - name: App — test
        working-directory: packages/loom_app
        run: flutter test
