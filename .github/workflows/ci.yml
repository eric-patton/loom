name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Resolve dependencies
        run: dart pub get

      - name: Analyze (treat warnings + infos as errors)
        run: dart analyze --fatal-infos --fatal-warnings

      - name: Format check
        run: dart format --output=none --set-exit-if-changed .

      - name: Test (unit + property tiers)
        env:
          # Global gate from PROJECT_SPEC.md Testing Strategy: 10,000 random
          # edit sequences per fixture per CI run. Local dev defaults to 100.
          LOOM_PROPERTY_ITERATIONS: "10000"
        run: dart test --concurrency=1
