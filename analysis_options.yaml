include: package:lints/recommended.yaml

analyzer:
  # Fixtures are Flutter source files we parse FROM A STRING at test time.
  # They're not part of the kernel's compile target and reference packages
  # (Flutter) we deliberately don't depend on. Exclude them from analysis.
  exclude:
    - test/fixtures/**
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    unused_import: error
    unused_local_variable: error
    missing_return: error
    dead_code: error
    todo: ignore

linter:
  rules:
    - prefer_final_locals
    - prefer_final_in_for_each
    - avoid_dynamic_calls
    - prefer_typing_uninitialized_variables
    - prefer_const_constructors
    - prefer_const_literals_to_create_immutables
    - comment_references
