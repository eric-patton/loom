version: 0.1.0
publish_to: none

environment:
  sdk: ^3.5.0

dependencies:
  analyzer: ^7.3.0
  dart_style: ^3.0.0
  path: ^1.9.0

dev_dependencies:
  test: ^1.25.0
  checks: ^0.3.0
  glados: ^1.1.6
  lints: ^5.0.0

executables:
  loom:
